# --- src111_merge15: ultra profile timeout/budget tuning ---
# 1) Avoid FAST_BAIL_TIMEOUT -> DEGRADE_EVIDENCE_LIST by letting retries run (no fast-bail on timeout-with-evidence)
openai.retry.fast-bailout-on-timeout-with-evidence=false

# 2) Give the main answer LLM more headroom in ultra (quality-first)
llm.timeout-seconds=18

# 3) Reduce aux blank/breaker-open (keywordSelection/queryTransformer)
llm.fast.timeout-seconds=4
query-transformer.llm.timeout-ms-hint=1200
query-transformer.llm.inflight-timeout-ms=5000

# 4) Increase opportunistic join window; in officialOnly we hard-join Brave until the deadline (code policy)
gpt-search.hybrid.naver-opportunistic-ms=1400
gpt-search.hybrid.naver.block-timeout-cap-ms=3000

# 5) Make the retry loop snappier (only affects non-fast-bail paths)
openai.retry.max-attempts=1
openai.retry.backoff-ms=200
