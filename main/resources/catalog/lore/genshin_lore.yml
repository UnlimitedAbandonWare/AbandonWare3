domain: "Genshin"
entries:
  - names: ["마비카", "마키바", "Makiba", "Mavuika", "mavuika"]
    content: >
      '마키바'는 원신 나타(Natlan) 지역의 불의 신 '마비카(Mavuika)'의 오타로 추정됩니다.
      그녀는 나타를 다스리는 집정관으로, 선글라스를 낀 현대적인 외형과 강인한 무력을 지니고 있습니다.
  - names: ["스커크", "Skirk", "skirk"]
    content: >
      '스커크(Skirk)'는 원신의 등장 인물/명칭으로 알려져 있으며, 동음이의(스컹크/Skunk)와 혼동될 수 있습니다.
      버전/패치 및 문맥에 따라 정보가 달라질 수 있으므로, 공식 공지/패치노트 기준으로 교차 확인하는 것이 안전합니다.
  - names: ["푸리나", "Furina"]
    content: >
      푸리나는 폰타인 지역의 물의 신 포칼로스의 인간 형태입니다.
      자신을 희생하여 폰타인의 예언을 막아낸 스토리의 핵심 인물입니다.
