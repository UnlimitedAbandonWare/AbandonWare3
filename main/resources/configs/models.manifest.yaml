  - id: "qwen3-vl:8b"
    provider: "local"
    endpoint:
      type: "openai_compat"
      base_url: "${LLM_VISION_BASE_URL:${LLM_3060_BASE_URL:${LLM_BASE_URL:http://127.0.0.1:11435/v1}}}"
      key_env: "${LLM_API_KEY:ollama}"
    capabilities: [chat, vision]
    ctx: 8192
