version: "2026-05-28"

bindings:
  default: "gemma4:26b"
  moe: "gemma4:26b"

aliases:
  cheap: "qwen3:8b"
  fast: "qwen3:8b"
  light: "qwen3:8b"
  rewrite: "qwen3:8b"
  explore: "qwen3:8b"
  vision: "qwen3-vl:8b"
  vl: "qwen3-vl:8b"
  judge: "qwen3:30b"
  critic: "qwen3:30b"
  coder: "qwen3-coder:30b"
  code: "qwen3-coder:30b"
  "gemma4-26b": "gemma4:26b"

models:
  - id: "gemma4:26b"
    provider: "local"
    endpoint:
      type: "openai_compat"
      base_url: "${LLM_BASE_URL:${LLM_3090_BASE_URL:http://127.0.0.1:11434/v1}}"
      key_env: "${LLM_API_KEY:ollama}"
    capabilities: [chat, reasoning]
    ctx: 8192
    price: {}
    tags: [default, moe, high, local, 3090]
  - id: "qwen3:8b"
    provider: "local"
    endpoint:
      type: "openai_compat"
      base_url: "${LLM_FAST_BASE_URL:${LLM_3060_BASE_URL:${LLM_BASE_URL:http://127.0.0.1:11435/v1}}}"
      key_env: "${LLM_API_KEY:ollama}"
    capabilities: [chat, reasoning]
    ctx: 8192
    price: {}
    tags: [cheap, fast, light, rewrite, explore, local, 3060]
  - id: "qwen3:30b"
    provider: "local"
    endpoint:
      type: "openai_compat"
      base_url: "${LLM_JUDGE_BASE_URL:${LLM_3090_BASE_URL:${LLM_BASE_URL:http://127.0.0.1:11434/v1}}}"
      key_env: "${LLM_API_KEY:ollama}"
    capabilities: [chat, reasoning, judge]
    ctx: 8192
    price: {}
    tags: [judge, critic, local, 3090]
  - id: "qwen3-coder:30b"
