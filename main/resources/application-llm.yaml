# --- application-llm.yaml (patched by GPT-5 Pro) ---
# Local OpenAI-compatible endpoints (Ollama/vLLM): 3090-class chat on 11434,
# 3060-class fast/vision/embedding lanes on 11435.
llm:
  provider: local
  # Mac mini-safe default; heavier local models should be enabled only by env override.
  base-url: ${LLM_BASE_URL:${LLM_3090_BASE_URL:http://127.0.0.1:11434/v1}}
  api-key: ${LLM_API_KEY:ollama}
  owner-token: ${LLM_OWNER_TOKEN:}
  owner-token-header: ${LLM_OWNER_TOKEN_HEADER:X-Owner-Token}
  chat-model: ${LLM_CHAT_MODEL:gemma4:26b}
  provider-guard:
    allow-private-remote: ${LLM_PROVIDER_GUARD_ALLOW_PRIVATE_REMOTE:false}
    allowed-hosts: ${LLM_PROVIDER_GUARD_ALLOWED_HOSTS:${MACMINI_API_ROUTER_ALLOWED_HOSTS:}}
    require-auth-for-remote: ${LLM_PROVIDER_GUARD_REQUIRE_AUTH_FOR_REMOTE:true}
  gateway:
    enabled: ${LLM_GATEWAY_ENABLED:true}
    enforcement: ${LLM_GATEWAY_ENFORCEMENT:observe}
    min-route-score: ${LLM_GATEWAY_MIN_ROUTE_SCORE:55}
    throw-on-empty-failure: ${LLM_GATEWAY_THROW_ON_EMPTY_FAILURE:false}
    cloud:
      enabled: ${LLM_GATEWAY_CLOUD_ENABLED:false}
      route-key: ${LLM_GATEWAY_CLOUD_ROUTE_KEY:api3}
    probe:
      enabled: ${LLM_GATEWAY_PROBE_ENABLED:true}
      timeout-ms: ${LLM_GATEWAY_PROBE_TIMEOUT_MS:1500}
      ttl-ms: ${LLM_GATEWAY_PROBE_TTL_MS:30000}
    spec-registry:
      enabled: ${LLM_GATEWAY_SPEC_REGISTRY_ENABLED:true}
      path: ${LLM_GATEWAY_SPEC_REGISTRY_PATH:./data/model-spec-registry.json}
  fast:
    base-url: ${LLM_FAST_BASE_URL:${LLM_3060_BASE_URL:http://127.0.0.1:11435/v1}}
    model: ${LLM_FAST_MODEL:qwen3:8b}
    temperature: 0.0
    timeout-seconds: 5
    max-retries: 0
    max-tokens: 256
  high:
    base-url: ${LLM_HIGH_BASE_URL:${LLM_3090_BASE_URL:${llm.base-url}}}
    model: ${LLM_HIGH_MODEL:${llm.chat-model:gemma4:26b}}
    temperature: 0.3
    timeout-seconds: 30
    max-retries: 0
    max-tokens: ${LLM_HIGH_MAX_TOKENS:1024}
  explore:
    base-url: ${LLM_EXPLORE_BASE_URL:${llm.fast.base-url}}
    model: ${LLM_EXPLORE_MODEL:${llm.fast.model}}
    temperature: 0.85
    timeout-seconds: 6
    max-retries: 0
    max-tokens: 512
  judge:
    base-url: ${LLM_JUDGE_BASE_URL:${llm.high.base-url}}
    model: ${LLM_JUDGE_MODEL:qwen3:30b}
    timeout-seconds: 6
    max-retries: 0
    max-tokens: 512
  coder:
    base-url: ${LLM_CODER_BASE_URL:${llm.high.base-url}}
    model: ${LLM_CODER_MODEL:qwen3-coder:30b}
    temperature: 0.1
    timeout-seconds: 45
    max-retries: 0
    max-tokens: 2048
  vision:
    base-url: ${LLM_VISION_BASE_URL:${llm.fast.base-url}}
    model: ${LLM_VISION_MODEL:qwen3-vl:8b}
    temperature: 0.0
    timeout-seconds: 15
    max-retries: 0
    max-tokens: 1024


# Stage-specific models (EXPLORE / JUDGE)
# Canonical settings are under llm.explore.* and llm.judge.*.



  # ?????????????????????????????????????????????????????????????????????
