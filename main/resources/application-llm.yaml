    endpoint-compat:
      # When a configured model is not compatible with /v1/chat/completions, try /v1/completions once.
      fallback-to-completions: true
      # When chat/completions is unsupported (or model hints /v1/responses), try /v1/responses once.
      fallback-to-responses: true
      # Extra diagnostics for endpoint-compat fallbacks (logs include response body summaries)
      fallback-debug: false
      # Save-time guard for likely completion-only models: BLOCK|WARN|ALLOW
      save-guard:
        mode: BLOCK
  ollama:
    enabled: ${LLM_OLLAMA_ENABLED:false}
    base-url: ${llm.base-url:http://127.0.0.1:11434/v1}
    chat-model: ${llm.chat-model:gemma4:26b}
    embed-model: ${embedding.model:qwen3-embedding:4b}
    timeout-ms: ${LLM_OLLAMA_TIMEOUT_MS:12000}

  # MERGED_DUP llm.base-url :: base-url: http://127.0.0.1:11435/v1
  # MERGED_DUP llm.provider :: provider: local

local-llm:
  enabled: ${LOCAL_LLM_ENABLED:false}
  autostart: ${LOCAL_LLM_AUTOSTART:false}
  ollama-host: ${OLLAMA_HOST:127.0.0.1:11434}
  health-check-url: ${LOCAL_LLM_HEALTH_CHECK_URL:}
  health-check-timeout: ${LOCAL_LLM_HEALTH_CHECK_TIMEOUT:20s}
  health-check-interval: ${LOCAL_LLM_HEALTH_CHECK_INTERVAL:1s}
  health-check-attempt-timeout: ${LOCAL_LLM_HEALTH_CHECK_ATTEMPT_TIMEOUT:2s}
  fail-fast: ${LOCAL_LLM_FAIL_FAST:false}
  warmup:
    enabled: ${LOCAL_LLM_WARMUP_ENABLED:true}
    pull: ${LOCAL_LLM_WARMUP_PULL:true}
    show: ${LOCAL_LLM_WARMUP_SHOW:true}
    embed: ${LOCAL_LLM_WARMUP_EMBED:true}
    model: ${LOCAL_LLM_WARMUP_MODEL:${embedding.model:qwen3-embedding:4b}}
    dimensions: ${LOCAL_LLM_WARMUP_DIMENSIONS:${embedding.dimensions:1536}}
    keep-alive: ${LOCAL_LLM_WARMUP_KEEP_ALIVE:5m}
    timeout-ms: ${LOCAL_LLM_WARMUP_TIMEOUT_MS:120000}

# Web / retrieval timeouts tuned to reduce false timeouts
tavily.enabled: ${TAVILY_ENABLED:false}
tavily.timeout-ms: 5000
tavily.max-results: 6

naver.search.timeout-ms: 3000
# Sync facade blockOptional(...) timeout. Default ties to naver.search.timeout-ms, but can be
# overridden when needed for soak/bootRun tuning.
naver.search.sync-block-timeout-ms: 3000
naver.search.web-top-k: 12

filters.domain_filter.enabled: false
selfask.enabled: ${SELFASK_ENABLED:false}
selfask.use-llm-seeds: false
selfask.use-llm-followups: false

# RAG defaults
retrieval:
  mode: RETRIEVAL_ON
  reranker: cross

vector:
  routing:
    min-per-store: 1
    topics:
      default:
        default: 1.0

filters:
  fail_safe:
    take-first-n: 8

onnx:
  device-id: 0   # RTX 3060 (GPU0)
  enabled: ${ONNX_ENABLED:false}
  gpu-id: 0
  max-concurrency: ${ZSYS_ONNX_MAX_CONCURRENCY:1}

zsys:
  onnx:
    enabled: ${ONNX_ENABLED:false}
    gpu-id: 0
    max-concurrency: ${ZSYS_ONNX_MAX_CONCURRENCY:1}

# --- Embedding (local Ollama) ---
embedding:
  provider: ${EMBED_PROVIDER:ollama}
  base-url: ${EMBED_BASE_URL:${EMBED_3060_BASE_URL:http://127.0.0.1:11435/api/embed}}
  base-url-fallback: ${EMBED_BASE_URL_FALLBACK:}
  cross-gpu-fallback:
    enabled: ${EMBED_CROSS_GPU_FALLBACK_ENABLED:false}
  port-fallback:
    enabled: ${EMBED_PORT_FALLBACK_ENABLED:false}
  ollama:
    keep-alive: ${EMBED_OLLAMA_KEEP_ALIVE:}
  fast-fail:
    enabled: ${EMBED_FAST_FAIL_ENABLED:true}
    fail-threshold: ${EMBED_FAST_FAIL_THRESHOLD:1}
    cooldown-seconds: ${EMBED_FAST_FAIL_COOLDOWN_SECONDS:60}
    cooldown:
      strategy: ${EMBED_FAST_FAIL_COOLDOWN_STRATEGY:fixed}
    force-open: ${EMBED_FAST_FAIL_FORCE_OPEN:false}
    force-open-seconds: ${EMBED_FAST_FAIL_FORCE_OPEN_SECONDS:0}
    health:
      enabled: ${EMBED_FAST_FAIL_HEALTH_ENABLED:true}
      mode: ${EMBED_FAST_FAIL_HEALTH_MODE:version}
      url: ${EMBED_FAST_FAIL_HEALTH_URL:}
      timeout-ms: ${EMBED_FAST_FAIL_HEALTH_TIMEOUT_MS:750}
      ok-ttl-seconds: ${EMBED_FAST_FAIL_HEALTH_OK_TTL_SECONDS:30}
      concurrent-guard: ${EMBED_FAST_FAIL_HEALTH_CONCURRENT_GUARD:true}
      embed-probe:
        timeout-ms: ${EMBED_FAST_FAIL_HEALTH_EMBED_PROBE_TIMEOUT_MS:1500}
        input: ${EMBED_FAST_FAIL_HEALTH_EMBED_PROBE_INPUT:ping}
        keep-alive: ${EMBED_FAST_FAIL_HEALTH_EMBED_PROBE_KEEP_ALIVE:0}
  model: ${EMBED_MODEL:qwen3-embedding:4b}
  # qwen3-embedding:4b raw output is 2560; index/cache/fallback contract remains 1536.
  provider-raw-dimensions: ${EMBED_PROVIDER_RAW_DIMENSIONS:2560}
  dimensions: ${EMBED_DIMENSIONS:1536}
  normalization-mode: ${EMBED_NORMALIZATION_MODE:SLICE_TO_CONFIGURED_DIM}
  dimension-guard-mode: ${EMBEDDING_DIM_GUARD_MODE:WARN_ONLY}
  log-dimension-mismatch: ${EMBEDDING_LOG_DIM_MISMATCH:true}
  timeout-seconds: ${EMBED_TIMEOUT_SECONDS:30}

  fallback:
    enabled: ${EMBED_FALLBACK_ENABLED:false}
    provider: openai
    base-url: https://api.openai.com/v1
    api-key: ${OPENAI_EMBED_FALLBACK_KEY:${OPENAI_API_KEY:}}
    model: text-embedding-3-small
    dimensions: 1536

rag:
  cognitive:
    enabled: ${RAG_COGNITIVE_ENABLED:true}
    model-id: ${RAG_COGNITIVE_MODEL_ID:light}
    max-tokens: ${RAG_COGNITIVE_MAX_TOKENS:512}
    timeout-ms: ${RAG_COGNITIVE_TIMEOUT_MS:5000}
  overdrive:
    trigger:
      error-rate-th: 0.35
      error-weight: 0.10

gpt-search:
  brave:
    enabled: true
    base-url: https://api.search.brave.com/res/v1/web/search
    # Boot must not fail on missing placeholders, but runtime must NOT proceed
    # with a blank token. We use a sentinel and disable the provider when the
    # key is missing/blank.
    api-key: ${BRAVE_API_KEY:__MISSING__}
    qps-limit: 1.0
    monthly-quota: ${GPT_SEARCH_BRAVE_MONTHLY_QUOTA:950}
    acquire-timeout-ms: 500
    # Align with Hybrid awaitWithDeadline (~2s) and remove core 4s floor via overlay.
    timeout-ms: 1800
    # Margin carved out from the outer hybrid await deadline (ms).
    # Default follows gpt-search.hybrid.await.deadline-margin-ms unless overridden.
    timeout-margin-ms: ${GPT_SEARCH_BRAVE_TIMEOUT_MARGIN_MS:${gpt-search.hybrid.await.deadline-margin-ms:120}}

jammini:
  guard:
    profile: PROFILE_MEMORY
  memory:
    progressive: true

naver:
  filters:
    domain-policy: boost
    enable-domain-filter: false



# LLM ?몄텧(?뱁엳 ?먭꺽 OpenAI) ?⑤컻 ?ㅻ쪟 ?鍮??ъ떆??
openai:
  retry:
    max-attempts: 1
    backoff-ms: 350
    # Total retry budget (0 = auto: timeout + backoff).
    max-total-ms: ${OPENAI_RETRY_MAX_TOTAL_MS:0}
    # Prevent single-timeout cliff when evidence exists.
    # 1 = legacy behavior, >=2 disables fast-bail so retries can run.
    fast-bailout-min-timeout-hits-with-evidence: ${OPENAI_FAST_BAIL_MIN_HITS_WITH_EVIDENCE:2}
    # Bound worst-case latency when fast-bail is suppressed (caps apply only when min-hits >= 2)
    fast-bailout-max-attempts-with-evidence: ${OPENAI_FAST_BAIL_MAX_ATTEMPTS_WITH_EVIDENCE:1}
    fast-bailout-timeout-seconds-cap: ${OPENAI_FAST_BAIL_TIMEOUT_SECONDS_CAP:6}
    fast-bailout-max-total-ms-with-evidence: ${OPENAI_FAST_BAIL_MAX_TOTAL_MS_WITH_EVIDENCE:0}

# ?????????????????????????????????????????????????????????????????????
# Nova orchestration overlay toggles (fail-soft)
# ?????????????????????????????????????????????????????????????????????
nova:
  orch:
    overdrive:
      enabled: true
      auto-activate-compression: true
      mark-compression-mode: true

    # Massive Parallel Query Expansion (disabled by default)
    extremez:
      enabled: false
      min-base-docs: 3
      max-sub-queries: 6
      budget-ms: 1500
      max-merged-docs: 16
      skip-when-strike-mode: true
      skip-when-web-rate-limited: true
      skip-when-aux-down: true
      risk-gate-enabled: true
      risk-score-threshold: 0.55
      contradiction-trigger-threshold: 0.60
      error-rate-trigger-threshold: 0.35
      scarcity-weight: 0.50
      contradiction-weight: 0.30
      error-rate-weight: 0.20
      starvation-weight: 0.20
      retrieval-failure-weight: 0.20
      starvation-trigger-threshold: 0.50
      max-contradiction-pairs: 3
      debug-events-enabled: true
      pattern-id-enabled: true

    # Thread-interrupt hygiene for pooled web-search threads
    interrupt-hygiene:
      enabled: true

    # ?????????????????????????????????????????????????????????????????????
    # OpenAI Chat/Responses endpoint compatibility guard
    # - Prevents "This is not a chat model" hard breaks on /v1/chat/completions
    # - Modes: SUBSTITUTE_CHAT | ROUTE_RESPONSES | FAIL_FAST
    # ?????????????????????????????????????????????????????????????????????
    model-guard:
      enabled: true
      mode: ${NOVA_MODEL_GUARD_MODE:SUBSTITUTE_CHAT}
      open-ai-base-only: true
      substitute-chat-model: ${NOVA_MODEL_GUARD_SUBSTITUTE_CHAT_MODEL:${llm.chat-model}}
      # Default list is already present in code; override only if needed.
      responses-only-prefixes:
        - gpt-4.1
        - gpt-4o
        - gpt-4.5
        - o1
        - o3
        - o4
        - gpt-5

    # ?????????????????????????????????????????????????????????????????????
    # Web retrieval fail-soft ladder (selection-stage), starvation/quality caps
    # - Enable SOAK_WEB_KPI JSON emission during soak runs
    # - Cap official-only starvation fallback to prevent NOFILTER_SAFE monopoly
    # ?????????????????????????????????????????????????????????????????????

    web-failsoft:
      emit-soak-kpi-json: ${NOVA_WEB_FAILSOFT_EMIT_SOAK_KPI_JSON:false}
      # Optional: emit a 1-minute rolling summary for SOAK_WEB_KPI signals
      # (avg outCount, outCount=0 ratio, budget_exhausted ratio,
      # brave cooldown/disabled ratio). Useful for 5~10min soak runs.
      soak-kpi-summary:
        enabled: ${NOVA_WEB_FAILSOFT_SOAK_KPI_SUMMARY_ENABLED:false}
        interval-ms: ${NOVA_WEB_FAILSOFT_SOAK_KPI_SUMMARY_INTERVAL_MS:60000}
        initial-delay-ms: ${NOVA_WEB_FAILSOFT_SOAK_KPI_SUMMARY_INITIAL_DELAY_MS:65000}
        emit-empty-windows: ${NOVA_WEB_FAILSOFT_SOAK_KPI_SUMMARY_EMIT_EMPTY:false}
      official-only-starvation-fallback-max-ratio: ${NOVA_WEB_FAILSOFT_OFFICIAL_ONLY_MAX_RATIO:0.55}

    # Provider 429/荑⑤떎???곗뇙(Brave ?? ?꾪솕: Retry-After + exp backoff ?⑹꽦(max)
    web:
      failsoft:
        # Hybrid empty fallback ratio cap: NOFILTER_SAFE (low-trust) results dominance limiter
        hybrid-empty-fallback:
          nofilter-safe:
            max-low-trust-ratio: ${NOVA_WEB_FAILSOFT_NOFILTER_SAFE_MAX_LOW_TRUST_RATIO:0.55}
        ratelimit-backoff:
          enabled: true
          # Global defaults (provider-specific override 媛??
          min-backoff-ms: 800
          max-backoff-ms: 30000
          jitter-ms: 150
          consecutive-reset-ms: 60000
          provider-specific:
            brave:
              # Brave??429媛 ?곗뇙濡??곗쭏 ?뚭? 留롮븘(荑⑤떎???ㅽ궢 ??＜), 湲곕낯媛믪쓣 ??蹂댁닔?곸쑝濡?
              min-backoff-ms: 2000

    # EvidenceList UX: fill blank title/snippet on DEGRADE_EVIDENCE_LIST (URL-only results)
    evidence-list:
      snippet-fallback:
        enabled: true
        # Mark derived snippets so they are not mistaken for an actual summary.
        annotate: true
        prefix: ${EVIDENCE_SNIPPET_FALLBACK_PREFIX:URL 湲곕컲 ?뚯깮}

    degraded-storage:
      drain:
        enabled: false
        batch-size: 50
        initial-delay-ms: 60000
        fixed-delay-ms: 300000
        require-evidence: true
        min-snippet-len: 80

    # {?ㅽ꽣??} KB persist=SKIPPED ???ㅼ젣 DB ????곌껐 (AOP 湲곕컲)
    kb-persistence:
      enabled: true

    # {?ㅽ꽣??} Brave QueryBurst: Brave/怨듦꺽 ?뚮옖?먯꽌 SmartQueryPlanner 寃곌낵瑜??뺤옣
    brave-query-burst:
      enabled: true
      min: 9
      max: 18
      cap: 18
      similarity-threshold: 0.80

    # ?????????????????????????????????????????????????????????????????????
    # Nova Overlay ??failure-pattern metrics + weak feedback
    # ?????????????????????????????????????????????????????????????????????
    failure:
      enabled: true
      # log-based detection (install logback appender at runtime)
      log-appender-enabled: true

      metrics:
        enabled: true
        counter-name: nova.failure.pattern

      jsonl:
        write-enabled: true
        path: logs/failure-pattern.jsonl
        max-file-bytes: 10485760
        read-tail-lines: 2000
        lookback-seconds: 900
        reload-interval-ms: 30000

      feedback:
        enabled: true
        # WEAK_REORDER (default) | SKIP_TURN (stronger)
        mode: WEAK_REORDER
        naver-trace-timeout-cooldown-seconds: 30
        circuit-open-cooldown-seconds: 60
        disambig-fallback-cooldown-seconds: 15

      # Optional: more precise circuit-open counting via Resilience4j events
      resilience4j-events:
        enabled: false

# ?????????????????????????????????????????????????????????????????????
# LLM Router configuration
# - Allows plan YAML to use logical model ids like: llmrouter.light
# ?????????????????????????????????????????????????????????????????????
llmrouter:
  enabled: true
  fallback-when-openai-missing: true
  cooldown-ms: 20000

  # Model aliases: keep role lanes distinct; do not collapse qwen/vision/coder into the chat model.
  aliases:
    gemma4-26b: ${LLM_CHAT_MODEL:gemma4:26b}
    fast: ${LLM_FAST_MODEL:qwen3:8b}
    cheap: ${LLM_FAST_MODEL:qwen3:8b}
    judge: ${LLM_JUDGE_MODEL:qwen3:30b}
    critic: ${LLM_JUDGE_MODEL:qwen3:30b}
    coder: ${LLM_CODER_MODEL:qwen3-coder:30b}
    vision: ${LLM_VISION_MODEL:qwen3-vl:8b}
  models:
    light:
      enabled: ${LLMROUTER_LIGHT_ENABLED:true}
      provider: local
      stage: chat
      name: ${LLMROUTER_LIGHT_NAME:${LLM_FAST_MODEL:qwen3:8b}}
      base-url: ${LLMROUTER_LIGHT_BASE_URL:${LLM_FAST_BASE_URL:${LLM_3060_BASE_URL:${llm.base-url:http://127.0.0.1:11435/v1}}}}
      weight: 0.45
    gemma:
      enabled: ${LLMROUTER_GEMMA_ENABLED:true}
      provider: local
      stage: chat
      name: ${LLMROUTER_GEMMA_NAME:${llm.chat-model:gemma4:26b}}
      base-url: ${LLMROUTER_GEMMA_BASE_URL:${LLM_3090_BASE_URL:${llm.base-url:http://127.0.0.1:11434/v1}}}
      weight: 0.55
    api3:
      enabled: ${LLMROUTER_API3_ENABLED:true}
      provider: groq
      stage: chat
      fallback-only: ${LLMROUTER_API3_FALLBACK_ONLY:true}
      name: ${LLMROUTER_API3_NAME:qwen/qwen3-32b}
      base-url: ${LLMROUTER_API3_BASE_URL:https://api.groq.com/openai/v1}
      weight: 0.0
    macmini:
      enabled: ${LLMROUTER_MACMINI_ENABLED:false}
      provider: local
      stage: chat
      name: ${LLMROUTER_MACMINI_NAME:${MACMINI_API_ROUTER_MODEL:llmrouter.auto}}
