    max-input-chars: ${PROMPT_POSE_DRAFT_MAX_INPUT_CHARS:360}
    max-output-chars: ${PROMPT_POSE_DRAFT_MAX_OUTPUT_CHARS:2400}
  policy:
    max-draft-lines: ${PROMPT_POSE_MAX_DRAFT_LINES:6}
    max-selfask-count: ${PROMPT_POSE_MAX_SELFASK_COUNT:3}
    max-queryburst-count: ${PROMPT_POSE_MAX_QUERYBURST_COUNT:18}
    min-queryburst-count: ${PROMPT_POSE_MIN_QUERYBURST_COUNT:2}
    max-temperature: ${PROMPT_POSE_MAX_TEMPERATURE:0.55}
    allow-external-free: ${PROMPT_POSE_ALLOW_EXTERNAL_FREE:false}
  application:
    enabled: ${PROMPT_POSE_APPLICATION_ENABLED:true}
    max-queryburst-count: ${PROMPT_POSE_APPLICATION_MAX_QUERYBURST_COUNT:16}
    explore-queryburst-count: ${PROMPT_POSE_APPLICATION_EXPLORE_QUERYBURST_COUNT:14}
    strict-queryburst-count: ${PROMPT_POSE_APPLICATION_STRICT_QUERYBURST_COUNT:8}
    failure-queryburst-count: ${PROMPT_POSE_APPLICATION_FAILURE_QUERYBURST_COUNT:10}
    min-citations-explore: ${PROMPT_POSE_APPLICATION_MIN_CITATIONS_EXPLORE:2}
    min-citations-strict: ${PROMPT_POSE_APPLICATION_MIN_CITATIONS_STRICT:3}
    min-citations-failure: ${PROMPT_POSE_APPLICATION_MIN_CITATIONS_FAILURE:4}
    max-answer-temperature: ${PROMPT_POSE_APPLICATION_MAX_ANSWER_TEMPERATURE:0.35}
    max-self-ask-temperature: ${PROMPT_POSE_APPLICATION_MAX_SELF_ASK_TEMPERATURE:0.55}
    low-reward-threshold: ${PROMPT_POSE_APPLICATION_LOW_REWARD_THRESHOLD:0.35}
    high-reward-threshold: ${PROMPT_POSE_APPLICATION_HIGH_REWARD_THRESHOLD:0.70}
  reward:
    enabled: ${PROMPT_POSE_REWARD_ENABLED:false}

# ?????????????????????????????????????????????????????????????????????
# UAW (Autolearn) gate / dataset internal API (Nova Overlay)
# ?????????????????????????????????????????????????????????????????????
query-transformer:
  llm:
    timeout-ms-hint: 2000
    inflight-timeout-ms: ${QUERY_TRANSFORMER_INFLIGHT_TIMEOUT_MS:4000}
    # Coalesce window for qtx soft-cooldown pulses (ms).
    # Helps avoid cooldown accumulation spikes when LLM loading/timeout repeats in a tight loop.
    soft-cooldown-coalesce-window-ms: ${QUERY_TRANSFORMER_SOFT_COOLDOWN_COALESCE_WINDOW_MS:750}

uaw:
  # Autolearn "?ъ슜??遺?? ?먮떒?먯꽌 GET/HEAD ?대쭅???ъ슜???쒕룞?쇰줈 蹂댁? ?딅룄濡?
  # 硫붿꽌??湲곗? ?꾪꽣瑜?湲곕낯 ?쒖꽦??(肄붾뱶 湲곕낯媛믨낵 ?숈씪)
  presence:
    include-methods: [POST, PUT, PATCH, DELETE]
    exclude-methods: [OPTIONS]

  # ?대? ?먮룞?숈뒿 seed("?대? ?먮룞?숈뒿:") ?붿껌??媛뺤젣 ?꾧꺽 紐⑤뱶濡??ㅽ뻾 (?좏깮)
  autolearn:
    min-evidence-count: ${UAW_AUTOLEARN_MIN_EVIDENCE_COUNT:3}
    min-context-diversity: ${UAW_AUTOLEARN_MIN_CONTEXT_DIVERSITY:0.30}
    validation:
      metrics-enabled: true
      dynamic-threshold-enabled: true
      window-size: ${UAW_AUTOLEARN_VALIDATION_WINDOW_SIZE:64}
      ewma-alpha: ${UAW_AUTOLEARN_VALIDATION_EWMA_ALPHA:0.20}
      contradiction-threshold: ${UAW_AUTOLEARN_CONTRADICTION_THRESHOLD:0.60}
      contradiction-threshold-min: ${UAW_AUTOLEARN_CONTRADICTION_THRESHOLD_MIN:0.50}
      contradiction-threshold-max: ${UAW_AUTOLEARN_CONTRADICTION_THRESHOLD_MAX:0.75}
      target-error-rate: ${UAW_AUTOLEARN_TARGET_ERROR_RATE:0.25}
      tuning-scale: ${UAW_AUTOLEARN_TUNING_SCALE:0.20}
      tuning-delta-min: ${UAW_AUTOLEARN_TUNING_DELTA_MIN:-0.04}
      tuning-delta-max: ${UAW_AUTOLEARN_TUNING_DELTA_MAX:0.08}
      max-train-error-rate: ${UAW_AUTOLEARN_MAX_TRAIN_ERROR_RATE:0.35}
      spike-error-rate: ${UAW_AUTOLEARN_SPIKE_ERROR_RATE:0.50}
      spike-error-rate-rise: ${UAW_AUTOLEARN_SPIKE_ERROR_RATE_RISE:0.25}
      spike-contamination-score: ${UAW_AUTOLEARN_SPIKE_CONTAMINATION_SCORE:0.55}
      spike-contamination-rise: ${UAW_AUTOLEARN_SPIKE_CONTAMINATION_RISE:0.20}
      drift-min-window: ${UAW_AUTOLEARN_DRIFT_MIN_WINDOW:8}
      drift-sample-score-drop: ${UAW_AUTOLEARN_DRIFT_SAMPLE_SCORE_DROP:0.20}
      drift-contamination-rise: ${UAW_AUTOLEARN_DRIFT_CONTAMINATION_RISE:0.15}
      auto-quarantine-enabled: true
      cycle-debug-enabled: true
    safety-pin:
      allow-zero-evidence-for-static-seeds: false
      max-zero-evidence-accepted-per-cycle: 0
    strict:
      enabled: false
      prefix: "?대? ?먮룞?숈뒿:"

      model: ${UAW_AUTOLEARN_STRICT_MODEL:${llm.chat-model}}
      max-tokens: ${UAW_AUTOLEARN_STRICT_MAX_TOKENS:1024}
      memory-mode: ${UAW_AUTOLEARN_STRICT_MEMORY_MODE:ephemeral}
      search-mode: FORCE_DEEP
      temperature: 0.2

    external-quota:
      enabled: ${UAW_AUTOLEARN_EXTERNAL_QUOTA_ENABLED:false}
      route-model: ${UAW_AUTOLEARN_EXTERNAL_QUOTA_ROUTE_MODEL:llmrouter.external}
      provider-host: ${UAW_AUTOLEARN_EXTERNAL_QUOTA_PROVIDER_HOST:opencode.ai}
      free-model: ${UAW_AUTOLEARN_EXTERNAL_QUOTA_FREE_MODEL:deepseek-v4-flash-free}
      max-calls-per-day: ${UAW_AUTOLEARN_EXTERNAL_QUOTA_MAX_CALLS_PER_DAY:3}
      max-output-tokens-per-day: ${UAW_AUTOLEARN_EXTERNAL_QUOTA_MAX_OUTPUT_TOKENS_PER_DAY:1536}
      max-output-tokens-per-call: ${UAW_AUTOLEARN_EXTERNAL_QUOTA_MAX_OUTPUT_TOKENS_PER_CALL:512}
      max-calls-per-cycle: ${UAW_AUTOLEARN_EXTERNAL_QUOTA_MAX_CALLS_PER_CYCLE:1}
      rate-limit-cooldown-seconds: ${UAW_AUTOLEARN_EXTERNAL_QUOTA_RATE_LIMIT_COOLDOWN_SECONDS:86400}
      strict-free-model-only: ${UAW_AUTOLEARN_EXTERNAL_QUOTA_STRICT_FREE_MODEL_ONLY:true}
      reset-zone: ${UAW_AUTOLEARN_EXTERNAL_QUOTA_RESET_ZONE:UTC}
      privacy-mode: ${UAW_AUTOLEARN_EXTERNAL_QUOTA_PRIVACY_MODE:STATIC_SYNTHETIC_ONLY}
      canonical-training-policy: ${UAW_AUTOLEARN_EXTERNAL_QUOTA_CANONICAL_TRAINING_POLICY:EXTERNAL_FREE_CURATE_ONLY}

    # Training-data 理쒖쥌 ?덉쟾?μ튂: UAW strict 寃곌낵瑜?dataset???ｊ린 吏곸쟾???ㅼ뿼 媛???섑뵆???쒖쇅
    # - hard exclude: 諛곕꼫/?ㅻ뜑 釉붾줉 ?⑦꽩 ??(allow濡?override 遺덇?)
    # - soft exclude: modelUsed ?쒓렇(?? fallback:*) ??(allow濡??덉쇅 ?덉슜 媛??
    dataset-filter:
      enabled: true
      override-policy:
        # strict 紐⑤뱶?먯꽌??allow 猷곗씠 ?꾨옒 洹몃９(????SOFT EXCLUDE留?override ?????덉쓬
        # (?? allow??modelUsed 怨꾩뿴 ?쒖쇅留??덉쇅 ?덉슜)
        strict-allow-overrides: true
        allow-overrides-soft-exclude-groups:
          - modelUsed
        # Optional: per-ALLOW-group matrix (key = allow rule.group, value = soft-exclude groups it can override).
        # If an ALLOW rule declares override-soft-exclude-groups, that takes precedence.
        allow-group-override-matrix:
          modelUsed:
            - modelUsed

        # When multiple allow-group matrix keys (globs) match the allow rule.group:
        # - MOST_SPECIFIC: choose the single most-specific key (default)
        # - FIRST_MATCH: choose the first matching key (config order)
        # - MERGE_ALL_MATCHES: union all matching keys' override groups
        allow-group-override-matrix-match-policy: MOST_SPECIFIC

        # If MOST_SPECIFIC yields a tie (same specificity):
        # - PICK_LEXICOGRAPHIC: choose lexicographically smallest key (default, deterministic)
        # - PICK_FIRST_IN_CONFIG: choose first key in config order
        # - MERGE_TIED: union tied keys' override groups
        # - DENY_TIED: deny overrides when tied (safe default for ambiguous configs)
        allow-group-override-matrix-tie-policy: PICK_LEXICOGRAPHIC

        # Optional: add override_source (global/rule/matrix/none) tag to decision metrics.
        # Off by default to avoid changing metric series.
        include-override-source-in-decision-metrics: false

        # Optional: add override_matrix_resolution (e.g., single_match|multi_tie_lex) tag to decision metrics.
        # Low-cardinality, but still off by default to avoid changing metric series.
        include-override-matrix-resolution-in-decision-metrics: false

        # Optional: warn (rate-limited) when override-matrix matching hits an ambiguity tie.
        # Use metrics uaw.autolearn.dataset_filter.override_matrix_tie_total for dashboards.
        warn-on-override-matrix-tie: false

      # Sample-level trace logging (DEBUG only). Metrics are recorded regardless of this setting.
      trace:
        enabled: false
        include-sample-hash: false
      rules:
        # --- HARD EXCLUDE (allow濡?override 遺덇?) ---
        - name: hard_answer_degraded_banner
          group: banner
          priority: 1000
          action: EXCLUDE
          hard: true
          scope: ANSWER
          patterns:
            # FallbackBannerAspect 媛 prepend ?섎뒗 諛곕꼫 (以??쒖옉 湲곗?)
            - '^\s*※\s*\[DEGRADED\s+MODE\]'
            # ?뱀떆 Markdown ?ㅻ뜑濡??섑븨???뺥깭
            - '^\s*#{1,6}\s*\[DEGRADED\s+MODE\]'

        - name: hard_question_degraded_banner
          group: banner
          priority: 900
          action: EXCLUDE
          hard: true
          scope: PROMPT
          patterns:
            - '^\s*※\s*\[DEGRADED\s+MODE\]'

        # --- ALLOW (soft exclude留?override) ---
        # ?? fallback:*???꾨? ?쒖쇅?섎릺, ?뱀젙 fallback 留?dataset ?덉슜?섍퀬 ?띠쓣 ???ъ슜
        # - name: allow_model_used_fallback_whitelist
        #   group: modelUsed
        #   priority: 200
        #   action: ALLOW
        #   scope: MODEL_USED
        #   patterns:
        #     - '^fallback:allowed:'

        # --- SOFT EXCLUDE (allow濡??덉쇅 ?덉슜 媛?? ---
        - name: soft_model_used_fallback
          group: modelUsed
          priority: 100
          action: EXCLUDE
          hard: false
          scope: MODEL_USED
          patterns:
            # ?? gemma4:26b:fallback:evidence / fallback:* ??
            - 'fallback:'
  # ?대? ?꾩슜 dataset append API (?좏깮)
  dataset-api:
    enabled: false
    # 媛믪씠 鍮꾩뼱?덉? ?딆쑝硫??붿껌 ?ㅻ뜑 X-Internal-Key? ?쇱튂?댁빞 ??
    key: ""

# (Optional) expose actuator metrics endpoints locally
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ?????????????????????????????????????????????????????????????????????
# Privacy / sensitive boundary defaults
# ?????????????????????????????????????????????????????????????????????
privacy:
  sensitive:
    enabled: true
    answer-temperature: 0.2
    explore-temp-cap: 0.7
  boundary:
    mask-web-query: true
    max-query-length: 220
    # Stronger mode (DROP 諛⑺뼢 ?뺤옣):
    # - on sensitive topics, block outbound web search entirely
    block-web-search-on-sensitive: false
    # - always block outbound web search (global kill switch)
    block-web-search: false

