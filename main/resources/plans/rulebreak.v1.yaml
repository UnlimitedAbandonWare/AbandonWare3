# MERGE_HOOK:PROJ_AGENT::FIM15
llm:
  provider: local
  model: ${llm.high.model:${llm.chat-model}}

name: rulebreak.v1
retrieval:
  kalloc: { web-weight: 0.85, rag-weight: 0.15 }
  web: { webTopK: 22, timeoutMs: 2500 }
fusion: { calibratedRrf: true }
rerank: { onnx: { enabled: true, budgetMs: 2000, maxConcurrency: 4 } }
safety: { citationGate: { minOfficialSources: 1, minSnippetChars: 200 } }
# NineTile alias corrector toggle
alias:
  corrector:
    enabled: true

probe:
  search:
    enabled: false

  vector:
    enabled: true

guard:
  profile: PROFILE_FREE
