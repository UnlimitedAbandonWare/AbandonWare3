# Auto-generated by patch: operational toggles and safe defaults
spring:
  main:
    allow-bean-definition-overriding: true  # safety net; real fix is removing duplicate beans

retrieval:
  vector:
    enabled: true
naver:
  search:
    timeout-ms: 2500
    web-top-k: 10
    cache:
      enabled: true
      ttl-seconds: 3600

  filters:
    domain-policy: boost
    enable-domain-filter: false
upstash:
  cache:
    ttl-seconds: 3600
onnx:
  enabled: true
zsys:
  onnx:
    enabled: true
    gpu-id: 0
    max-concurrency: 2
probe:
  search:
    enabled: true
gate:
  citation:
    enabled: true
    min: 3
  finalSigmoid:
    enabled: true
    k: 12.0
    x0: 0.0
llm:
  base-url: http://localhost:11434/v1
  api-key: ${LLM_API_KEY:}
  chat-model: gemma3:27b

  provider: local
  # MERGED_DUP llm.base-url :: base-url: http://localhost:11434/v1   # 3090-only endpoint
  # MERGED_DUP llm.provider :: provider: local

selfask:
  enabled: false

train_idle:
  enabled: true

autolearn:
  enabled: true

fallback:
  enabled: false

jammini:
  guard:
    profile: PROFILE_MEMORY
  memory:
    progressive: true

# --- RAG quality toggles (2026-05-15) ---
# MMR diversity reranker in RankingPipeline. lambda=1.0 = pure relevance.
rag:
  rerank:
    mmr:
      enabled: true
      lambda: 0.7
  query:
    rewrite:
      enabled: true
      max-variants: 3
  fusion:
    normalize:
      # one of: minmax | zscore | rank | off
      strategy: zscore
